<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Programming Projects</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h2>Akul Kadyan</h2>

<nav>
<a href="index.html">Home</a>
<a href="programming.html">Programming</a>
<a href="arduino.html">Arduino</a>
<a href="integrated.html">Integrated</a>
</nav>

</header>


<!-- Page Header -->

<section class="page-header">

<h1>Programming Projects</h1>

<p>
Software development projects focused on algorithms, data structures,
and application design.
</p>

</section>


<!-- Projects Section -->

<section class="section">

<div class="projects" id="project-container"></div>

</section>


<!-- Script -->

<script>

function loadProjects(category){
  fetch('projects.json')
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById('project-container');

      container.innerHTML = "";
      
      data
        .filter(p => p.category === category)
        .forEach(p => {

          const card = `
            <div class="project-card">

              <img src="${p.image}" class="project-image">

              <div class="project-content">

                <h3>${p.title}</h3>

                <p>${p.description}</p>

                <div class="tech-stack">${p.tech}</div>

                <div class="project-links">
                  <a href="${p.github}" target="_blank">
                    <i class="fa-brands fa-github"></i> GitHub
                  </a>
                </div>

              </div>

            </div>
          `;

          container.innerHTML += card;
        });
    });
}

  loadProjects("programming");

</script>

</body>
</html>
